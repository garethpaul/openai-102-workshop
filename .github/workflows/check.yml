name: Check

on:
  pull_request:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install "openai<1.0" "numpy<2" scikit-learn pytest requests beautifulsoup4
      - run: make check
